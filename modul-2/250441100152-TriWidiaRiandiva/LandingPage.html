<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Premium</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
    }

    header {
      background-color: black;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      color: white;
      font-size: 250%;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 5px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .utama {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 60px;
      background-color: white;
    }

    .teks-utama {
      max-width: 500px;
    }

    .teks-utama h2 {
      font-size: 250%;
      color: #222;
    }

    .teks-utama p {
      color: #555;
      text-align: justify;
    }

    .tombol {
      display: inline-flex;
      padding: 15px;
      background-color: #000000;
      color: #fff;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    .tombol:hover {
      text-decoration: underline;
    }

    #produk-img {
      width: 400px;
    }
  </style>
</head>
<body>
  <header>
    <h1>BAND MERCH THE JEBLOG</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Produk</a>
      <a href="#">Tentang Kami</a>
      <a href="#">Kontak</a>
    </nav>
  </header>

<div class="utama">
  <div class="teks-utama">
    <h2>Merch Band, Bukan Sekadar Fashion</h2>
    <p>Kaos band eksklusif dengan desain autentik, dibuat untuk kamu yang hidup dengan musik dan ingin mengekspresikan identitas di setiap langkah.</p>
    <a href="#" class="tombol">Start To Style</a>
  </div>
  <img src="T-shirt.jpg" id="produk-img">
</div>

  <footer>
    <p>&copy; 2026 Fashion Premium. All rights reserved.</p>
  </footer>
</body>
</html>
