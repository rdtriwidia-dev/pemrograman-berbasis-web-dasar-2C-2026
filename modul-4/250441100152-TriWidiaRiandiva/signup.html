<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <form id="signupForm" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md space-y-4">
    <h2 class="text-2xl font-bold text-center text-[#FF9335]">Sign Up</h2>
    
    <div>
      <label class="block text-gray-700 font-bold mb-2">Nama</label>
      <input type="text" id="name" class="border rounded w-full p-2">
    </div>
    
    <div>
      <label class="block text-gray-700 font-bold mb-2">Email</label>
      <input type="email" id="email" class="border rounded w-full p-2">
    </div>
    
    <div>
      <label class="block text-gray-700 font-bold mb-2">Password</label>
      <input type="password" id="password" class="border rounded w-full p-2">
    </div>
    
    <button type="submit" class="w-full bg-[#FF9335] text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600">
      Daftar
    </button>
  </form>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(event){
      event.preventDefault();
      
      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;
      
      if (name === "") { alert("Nama tidak boleh kosong!"); return; }
      if (!email.includes("@.com")) { alert("Format email tidak valid!"); return; }
      if (password.length < 8) { alert("Password minimal 8 karakter!"); return; }
      
      alert("Form berhasil divalidasi!");
      window.location.href = "ulanguts.html"; 
    });
  </script>
</body>
</html>
